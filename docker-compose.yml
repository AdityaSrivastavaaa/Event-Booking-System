version: "3.8"

services:

  mysql:
    image: mysql:8.0
    container_name: event_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: event_booking
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  app:
    build: .
    container_name: event_app
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - mysql
    environment:
      DB_NAME: event_booking
      DB_USER: root
      DB_PASS: root123
      DB_HOST: mysql
      PORT: 5000

volumes:
  mysql_data: