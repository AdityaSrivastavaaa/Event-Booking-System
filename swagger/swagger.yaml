openapi: 3.0.0
info:
  title: Event Booking API
  version: 1.0.0
  description: Mini Event Management System

servers:
  - url: http://localhost:5000/api

paths:

  /users:
    post:
      summary: Create user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email]
              properties:
                name:
                  type: string
                email:
                  type: string
      responses:
        201:
          description: User created

    get:
      summary: Get all users
      responses:
        200:
          description: List of users

  /users/{id}:
    get:
      summary: Get user by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        200:
          description: User details

  /users/{id}/bookings:
    get:
      summary: Get bookings for user
      parameters:
        - in: path
          name: id
          required: true
      responses:
        200:
          description: User bookings

  /events:
    get:
      summary: Get all events
      responses:
        200:
          description: List of events

    post:
      summary: Create event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, date, capacity]
              properties:
                title:
                  type: string
                description:
                  type: string
                date:
                  type: string
                capacity:
                  type: integer
      responses:
        201:
          description: Event created

  /bookings:
    post:
      summary: Book ticket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, eventId]
              properties:
                userId:
                  type: integer
                eventId:
                  type: integer
      responses:
        201:
          description: Booking successful

  /events/{id}/attendance:
    post:
      summary: Mark attendance
      parameters:
        - in: path
          name: id
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
      responses:
        200:
          description: Attendance marked